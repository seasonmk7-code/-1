<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电商定价策略计算器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');
        body { font-family: 'Inter', 'Microsoft YaHei', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen py-10 px-4">

    <div class="max-w-2xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden">
        <div class="bg-indigo-600 p-6 text-white text-center">
            <h1 class="text-2xl font-bold">策略1 -- 基于成本定价</h1>
            <p class="mt-2 opacity-80 text-sm">快速计算产品上架价格（包邮/不包邮）</p>
        </div>

        <div class="flex border-b">
            <button onclick="switchTab('non-free')" id="tab-non-free" class="flex-1 py-4 text-center font-semibold border-b-2 border-indigo-600 text-indigo-600 transition-all">不包邮模式</button>
            <button onclick="switchTab('free')" id="tab-free" class="flex-1 py-4 text-center font-semibold border-b-2 border-transparent text-gray-500 hover:text-indigo-600 transition-all">包邮模式</button>
        </div>

        <div class="p-8">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">产品成本 (¥)</label>
                        <input type="number" id="cost" placeholder="0.00" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition-all" oninput="calculate()">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">运费 (¥)</label>
                        <input type="number" id="shipping" placeholder="0.00" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition-all" oninput="calculate()">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">利润率 (%)</label>
                        <input type="number" id="profit" placeholder="15" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition-all" oninput="calculate()">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">佣金率 (%)</label>
                        <input type="number" id="commission" placeholder="5" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition-all" oninput="calculate()">
                    </div>
                </div>

                <div class="bg-gray-50 rounded-xl p-6 flex flex-col justify-center items-center border border-dashed border-gray-300">
                    <span class="text-gray-500 text-sm mb-2">建议上架价格</span>
                    <div class="text-4xl font-bold text-indigo-600" id="result">¥ 0.00</div>
                    <div class="mt-4 text-xs text-gray-400 text-center leading-relaxed">
                        <p id="formula-desc">公式：成本 * (1 + 利润率) / (1 - 佣金率) + 运费 * 佣金率</p>
                    </div>
                </div>
            </div>

            <div class="mt-8 p-4 bg-blue-50 rounded-lg">
                <h3 class="text-sm font-semibold text-blue-800 mb-1">📌 逻辑说明：</h3>
                <ul class="text-xs text-blue-700 space-y-1 list-disc ml-4">
                    <li><b>不包邮：</b>上架价需覆盖成本利润，并补足运费产生的佣金支出。</li>
                    <li><b>包邮：</b>将运费视作成本的一部分进行整体加价。</li>
                </ul>
            </div>
        </div>
    </div>

    <script>
        let currentMode = 'non-free';

        function switchTab(mode) {
            currentMode = mode;
            // 样式切换
            const tabNonFree = document.getElementById('tab-non-free');
            const tabFree = document.getElementById('tab-free');
            const formulaDesc = document.getElementById('formula-desc');

            if (mode === 'non-free') {
                tabNonFree.classList.add('border-indigo-600', 'text-indigo-600');
                tabFree.classList.remove('border-indigo-600', 'text-indigo-600');
                formulaDesc.innerText = "公式：成本 * (1 + 利润率) / (1 - 佣金率) + 运费 * 佣金率";
            } else {
                tabFree.classList.add('border-indigo-600', 'text-indigo-600');
                tabNonFree.classList.remove('border-indigo-600', 'text-indigo-600');
                formulaDesc.innerText = "公式：(成本 + 运费) * (1 + 利润率) / (1 - 佣金率)";
            }
            calculate();
        }

        function calculate() {
            const cost = parseFloat(document.getElementById('cost').value) || 0;
            const shipping = parseFloat(document.getElementById('shipping').value) || 0;
            const profit = (parseFloat(document.getElementById('profit').value) || 0) / 100;
            const commission = (parseFloat(document.getElementById('commission').value) || 0) / 100;
            
            let finalPrice = 0;

            if (commission >= 1) {
                document.getElementById('result').innerText = "率值错误";
                return;
            }

            if (currentMode === 'non-free') {
                // 公式：产品成本 * (1 + 利润率) / (1-佣金率) + 运费 * 佣金率
                finalPrice = (cost * (1 + profit)) / (1 - commission) + (shipping * commission);
            } else {
                // 公式：(产品成本 + 运费) * (1 + 利润率) / (1-佣金率)
                finalPrice = (cost + shipping) * (1 + profit) / (1 - commission);
            }

            document.getElementById('result').innerText = "¥ " + finalPrice.toFixed(2);
        }
    </script>
</body>
</html>
